name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: 1.93.1

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "Skipping format gate on pull_request; full format check runs on main."
            exit 0
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            if [[ "${{ github.event.before }}" == "0000000000000000000000000000000000000000" ]]; then
              echo "No previous commit to diff against on push; skipping format gate."
              exit 0
            fi

            mapfile -t rust_files < <(git diff --name-only "${{ github.event.before }}..${{ github.sha }}" | grep -E '\.rs$' || true)
            if [[ ${#rust_files[@]} -eq 0 ]]; then
              echo "No Rust files changed in this push."
              exit 0
            fi

            cargo fmt -- --check "${rust_files[@]}"
          else
            cargo fmt -- --check
          fi

      - name: Clippy
        run: cargo clippy --all-targets

      - name: Integration test (HTTP methods)
        run: cargo test --test http_methods

  security:
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Cargo audit
        run: cargo audit
