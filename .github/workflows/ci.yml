name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: 1.93.1

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Format check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            mapfile -t rust_files < <(
              gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" --paginate --jq '.[].filename' | grep -E '\.rs$' || true
            )
            if [[ ${#rust_files[@]} -eq 0 ]]; then
              echo "No Rust files changed in this PR."
              exit 0
            fi

            existing_files=()
            for file in "${rust_files[@]}"; do
              if [[ -f "$file" ]]; then
                existing_files+=("$file")
              fi
            done

            if [[ ${#existing_files[@]} -eq 0 ]]; then
              echo "No existing Rust files to format-check."
              exit 0
            fi

            cargo fmt -- --check "${existing_files[@]}"
          else
            cargo fmt -- --check
          fi

      - name: Clippy
        run: cargo clippy --all-targets

      - name: Integration test (HTTP methods)
        run: cargo test --test http_methods

  security:
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Cargo audit
        run: cargo audit
